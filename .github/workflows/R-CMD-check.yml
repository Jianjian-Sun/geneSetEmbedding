# Run Makefile-based R package checks on push/PR and publish results to GitHub.
# Primary target: `make check2` (build tarball + R CMD check, CRAN-like).
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: R-CMD-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  makefile-check:
    runs-on: ubuntu-latest
    name: Makefile check2 (Ubuntu)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup system dependencies (RcppArmadillo)
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libblas-dev gfortran

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            any::devtools
            any::rcmdcheck

      - name: Run Makefile check2
        run: make check2
        shell: bash

      - name: Upload R CMD check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: R-CMD-check-logs
          path: |
            ../*.Rcheck/**/*
            ../*_*.tar.gz
          retention-days: 14

      - name: Test coverage (testthat)
        run: Rscript -e "testthat::test_local('tests/testthat/')"
        shell: bash
